name: Update Pulse Data

on:
  repository_dispatch:
    types: [external_pulse_trigger]
  schedule:
    - cron: '22 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        run: python aggregator.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed to avoid empty commit errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update" && git push)